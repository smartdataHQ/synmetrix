- name: save_logs
  webhook: '{{ACTIONS_URL}}/rpc/save_logs'
  schedule: '* * * * *'
  include_in_metadata: true
  payload: {}
  comment: ""
- name: audit_logs_retention_90d
  webhook: '{{ACTIONS_URL}}/rpc/audit_logs_retention'
  schedule: '0 4 * * *'
  include_in_metadata: true
  payload: {}
  comment: "Delete audit_logs rows older than 90 days (FR-016 retention)."
- name: reconcile_default_models
  webhook: '{{ACTIONS_URL}}/rpc/reconcileDefaultModels'
  schedule: '*/15 * * * *'
  include_in_metadata: true
  payload:
    trigger: schedule
  headers:
    - name: x-actions-cron-secret
      value_from_env: ACTIONS_CRON_SECRET
  comment: "Default-models reconciliation orchestrator (013, FR-007a): template-publish detection + data-drift refresh."
