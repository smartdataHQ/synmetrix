actions:
  # Convention: every action sets an explicit `timeout`. Without one Hasura
  # defaults to 30s, which is too short for compile/profile paths and too
  # generous for trivial mutations. Bands:
  #   10s   — local-only sync mutations that should never block on I/O
  #   30s   — DB-bound mutations / lookups against well-warmed tables
  #   60s   — read paths that may touch ClickHouse system tables or
  #           generate SQL across the whole cube graph
  #   120s  — Cube.js compile-bound queries (cold cache hits 14-30s p99)
  #   180s  — first-time table introspection / multi-step gen flows
  #   300s  — long-running profiling, LLM-driven generation, big query
  #           runs against analytical stores
  - name: check_connection
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/check_connection'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: create_events
    definition:
      kind: asynchronous
      handler: '{{ACTIONS_URL}}/rpc/create_events'
      forward_client_headers: true
      timeout: 10
    permissions:
      - role: anonymous
  - name: create_team
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/create_team'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: export_data_models
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/export_data_models'
      timeout: 60
    permissions:
      - role: user
  - name: fetch_dataset
    definition:
      kind: ""
      handler: '{{ACTIONS_URL}}/rpc/fetch_dataset'
      forward_client_headers: true
      timeout: 60
    permissions:
      - role: user
  - name: fetch_meta
    definition:
      kind: ""
      handler: '{{ACTIONS_URL}}/rpc/fetch_meta'
      forward_client_headers: true
      # Cube.js compile of a cold schema can run 14-30s; default 30s was
      # racing the compile and surfacing as "save timeout" in the editor.
      timeout: 120
    permissions:
      - role: user
  - name: fetch_tables
    definition:
      kind: ""
      handler: '{{ACTIONS_URL}}/rpc/fetch_tables'
      forward_client_headers: true
      timeout: 180
    permissions:
      - role: user
  - name: gen_dataschemas
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/gen_schemas'
      forward_client_headers: true
      timeout: 180
    permissions:
      - role: user
  - name: gen_sql
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/gen_sql'
      forward_client_headers: true
      timeout: 60
    permissions:
      - role: user
  - name: invite_team_member
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/invite_team_member'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: pre_aggregation_preview
    definition:
      kind: ""
      handler: '{{ACTIONS_URL}}/rpc/pre_aggregation_preview'
      forward_client_headers: true
      timeout: 60
    permissions:
      - role: user
  - name: pre_aggregations
    definition:
      kind: ""
      handler: '{{ACTIONS_URL}}/rpc/pre_aggregations'
      timeout: 60
    permissions:
      - role: user
  - name: run_query
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/run_query'
      forward_client_headers: true
      # User queries against analytical stores can be slow on cold caches
      # / large scans. 300s matches the longest-running Cube.js queries
      # we've observed; queries beyond that should time out anyway.
      timeout: 300
    permissions:
      - role: user
  - name: profile_table
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/profileTable'
      forward_client_headers: true
      # Profiling does multiple ClickHouse passes (DESCRIBE, distinct counts,
      # LC probes, map key enumeration, nested-array stats). On large tables
      # the LC probe alone can take a couple of minutes.
      timeout: 300
    permissions:
      - role: user
  - name: smart_gen_dataschemas
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/smartGenSchemas'
      forward_client_headers: true
      timeout: 300
    permissions:
      - role: user
  - name: update_team_settings
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/updateTeamSettings'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: list_all_teams
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/listAllTeams'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: manage_query_rewrite_rule
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/manageQueryRewriteRule'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: update_member_properties
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/updateMemberProperties'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: update_team_properties
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/updateTeamProperties'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
  - name: copy_datasource
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/copyDatasource'
      forward_client_headers: true
      # Copy fans out to fetch + recreate datasource configs and may
      # backfill schemas; budget enough headroom for the slowest path.
      timeout: 60
    permissions:
      - role: user
  - name: provision_default_datasources
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/provision_default_datasources'
      forward_client_headers: true
      timeout: 120
    permissions:
      - role: admin
  - name: send_test_alert
    definition:
      kind: synchronous
      handler: '{{ACTIONS_URL}}/rpc/send_test_alert'
      forward_client_headers: true
      timeout: 30
    permissions:
      - role: user
custom_types:
  enums: []
  input_objects:
    - name: SourceTable
    - name: events_create_input
    - name: ArrayJoinInput
    - name: FilterConditionInput
    - name: NestedFilterConditionInput
    - name: NestedFilterInput
  objects:
    - name: CheckSourceOutput
    - name: GenSourceSchemaOutput
    - name: SourceTablesOutput
    - name: SourceMetaOutput
    - name: RunSourceQueryOutput
    - name: CheckConnectionOutput
    - name: FetchDatasetOutput
    - name: InviteTeamMemberOutput
    - name: CreateTeamOutput
    - name: GenSQLOutput
    - name: events_create_mutation_response
    - name: ExportDataModelsOutput
    - name: PreAggregationsOutput
    - name: PreAggregationPreviewOutput
    - name: SendTestAlertOutput
    - name: ProfileTableOutput
    - name: ExistingModelInfo
    - name: ProfiledColumnOutput
    - name: ArrayCandidateOutput
    - name: SmartGenOutput
    - name: UpdateTeamSettingsOutput
    - name: ListAllTeamsOutput
    - name: TeamInfo
    - name: ManageQueryRewriteRuleOutput
    - name: UpdateTeamPropertiesOutput
    - name: UpdateMemberPropertiesOutput
    - name: CopyDatasourceOutput
    - name: ProvisionDefaultDatasourcesOutput
    - name: ProvisionTeamResult
  scalars: []
