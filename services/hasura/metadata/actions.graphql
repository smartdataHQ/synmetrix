type Mutation {
  check_connection(
    datasource_id: uuid!
  ): CheckConnectionOutput
}

type Mutation {
  create_events(
    objects: [events_create_input!]!
  ): events_create_mutation_response!
}

type Mutation {
  create_team(
    name: String!
  ): CreateTeamOutput
}

type Mutation {
  export_data_models(
    branch_id: String
  ): ExportDataModelsOutput
}

type Query {
  fetch_dataset(
    exploration_id: uuid!
    offset: Int
    limit: Int
  ): FetchDatasetOutput
}

type Query {
  fetch_meta(
    datasource_id: uuid!
    branch_id: uuid
  ): SourceMetaOutput
}

type Query {
  fetch_tables(
    datasource_id: uuid!
  ): SourceTablesOutput
}

type Mutation {
  gen_dataschemas(
    datasource_id: uuid!
    branch_id: uuid!
    tables: [SourceTable!]!
    overwrite: Boolean
    format: String
  ): GenSourceSchemaOutput
}

type Mutation {
  gen_sql(
    exploration_id: uuid!
  ): GenSQLOutput
}

type Mutation {
  invite_team_member(
    email: String!
    teamId: uuid
    role: String
    magicLink: Boolean
  ): InviteTeamMemberOutput
}

type Query {
  pre_aggregation_preview(
    datasource_id: String!
    pre_aggregation_id: String!
    table_name: String!
  ): PreAggregationPreviewOutput
}

type Query {
  pre_aggregations(
    datasource_id: String!
  ): PreAggregationsOutput
}

type Mutation {
  run_query(
    datasource_id: uuid!
    branch_id: uuid
    query: String!
    limit: Int!
  ): RunSourceQueryOutput
}

type Query {
  profile_table(
    datasource_id: uuid!
    branch_id: uuid!
    table_name: String!
    table_schema: String!
  ): ProfileTableOutput
}

type Mutation {
  smart_gen_dataschemas(
    datasource_id: uuid!
    branch_id: uuid!
    table_name: String!
    table_schema: String!
    array_join_columns: [ArrayJoinInput]
    max_map_keys: Int
    merge_strategy: String
    profile_data: jsonb
    dry_run: Boolean
  ): SmartGenOutput
}

type Mutation {
  update_team_settings(
    team_id: uuid!
    settings: jsonb!
  ): UpdateTeamSettingsOutput
}

type Mutation {
  send_test_alert(
    name: String
    deliveryType: String!
    deliveryConfig: json!
    explorationId: uuid
  ): SendTestAlertOutput
}

input ArrayJoinInput {
  column: String!
  alias: String!
}

input SourceTable {
  name: String!
  schema: String!
}

input events_create_input {
  data: json!
  page_context: json
  device_context: json
  user: json!
}

type CheckSourceOutput {
  message: String
  code: String!
}

type GenSourceSchemaOutput {
  message: String
  code: String!
}

type SourceTablesOutput {
  schema: json
}

type SourceMetaOutput {
  cubes: json
}

type RunSourceQueryOutput {
  result: json
}

type CheckConnectionOutput {
  message: String
  code: String!
}

type FetchDatasetOutput {
  annotation: json
  data: json
  query: json
  progress: json
  hitLimit: Boolean
  slowQuery: Boolean
  external: Boolean
  dbType: String
  dataSource: String
  lastRefreshTime: String
}

type InviteTeamMemberOutput {
  code: String
  message: String
  memberId: uuid
}

type CreateTeamOutput {
  id: uuid
  name: String
}

type GenSQLOutput {
  result: json
}

type events_create_mutation_response {
  affected_rows: Int
}

type ExportDataModelsOutput {
  download_url: String!
}

type PreAggregationsOutput {
  data: json!
}

type PreAggregationPreviewOutput {
  data: json!
}

type SendTestAlertOutput {
  error: Boolean
  result: json
}

type ProfileTableOutput {
  code: String!
  row_count: Int
  sampled: Boolean!
  sample_size: Int
  columns: [ProfiledColumnOutput]
  array_candidates: [ArrayCandidateOutput]
  primary_keys: [String]
  existing_model: ExistingModelInfo
  raw_profile: jsonb
}

type ExistingModelInfo {
  file_name: String!
  file_format: String!
  has_user_content: Boolean!
  supports_reprofile: Boolean!
  suggested_merge_strategy: String!
}

type ProfiledColumnOutput {
  name: String!
  raw_type: String!
  column_type: String!
  value_type: String!
  has_values: Boolean!
  value_rows: Int
  unique_values: Int
  min_value: String
  max_value: String
  avg_value: Float
  max_array_length: Int
  unique_keys: [String]
  lc_values: jsonb
  key_stats: jsonb
  description: String
}

type ArrayCandidateOutput {
  column: String!
  element_type: String!
  suggested_alias: String!
}

type SmartGenOutput {
  code: String!
  message: String
  version_id: uuid
  file_name: String
  changed: Boolean!
  change_preview: jsonb
}

type UpdateTeamSettingsOutput {
  code: String!
  message: String
}

type Mutation {
  list_all_teams(
    limit: Int
    offset: Int
    search: String
  ): ListAllTeamsOutput
}

type Mutation {
  manage_query_rewrite_rule(
    action: String!
    id: uuid
    cube_name: String
    dimension: String
    property_source: String
    property_key: String
    operator: String
  ): ManageQueryRewriteRuleOutput
}

type Mutation {
  update_member_properties(
    member_id: uuid!
    properties: jsonb!
  ): UpdateMemberPropertiesOutput
}

type Mutation {
  update_team_properties(
    team_id: uuid!
    properties: jsonb!
  ): UpdateTeamPropertiesOutput
}

type ListAllTeamsOutput {
  teams: [TeamInfo!]!
  total: Int!
}

type TeamInfo {
  id: uuid!
  name: String!
  settings: jsonb
  member_count: Int!
  datasource_count: Int!
  created_at: String!
}

type ManageQueryRewriteRuleOutput {
  success: Boolean!
  rule_id: uuid
}

type UpdateTeamPropertiesOutput {
  success: Boolean!
}

type UpdateMemberPropertiesOutput {
  success: Boolean!
}

type Mutation {
  copy_datasource(
    datasource_id: uuid!
    target_team_id: uuid!
  ): CopyDatasourceOutput
}

type CopyDatasourceOutput {
  id: uuid
  name: String
}

