openapi: 3.1.0
info:
  title: Synmetrix Model Management — Version Rollback
  version: "011.2"
paths:
  /api/v1/version/rollback:
    post:
      operationId: rollbackVersion
      summary: Clone a prior version's dataschemas into a new active version.
      description: |
        Creates a new `versions` row on the specified branch whose dataschemas are
        byte-identical clones of the target version's dataschemas. Does NOT touch
        explorations, alerts, or any other version-bound records (FR-013a,
        Clarification Q3). Version history is preserved (FR-014).
        The new version's `origin` column is set to `rollback` for audit.

        AUTH: branch-scoped endpoint. Direct-verify; no `x-hasura-datasource-id`
        header required or accepted. The handler resolves the datasource server-side
        from the branch id in the body. Requires owner or admin role on the
        datasource team (FR-015).
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RollbackRequest' }
      responses:
        "200":
          description: Rollback complete.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RollbackResponse' }
        "400":
          description: |
            Malformed request or rollback precondition failed. Possible codes:
            `rollback_version_not_on_branch`, `rollback_invalid_request`,
            `rollback_source_columns_missing`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "403":
          description: Missing/invalid auth or caller lacks owner/admin role on the datasource team.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        "404":
          description: Branch or version not found / not visible.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorCode:
      type: string
      description: |
        Canonical Synmetrix Model-Management API error code (FR-017).
        Single source of truth: services/cubejs/src/utils/errorCodes.js.
      enum:
        - validate_invalid_mode
        - validate_target_not_found
        - validate_unresolved_reference
        - refresh_branch_not_visible
        - refresh_unauthorized
        - delete_blocked_by_references
        - delete_blocked_historical_version
        - delete_blocked_authorization
        - cube_not_found
        - diff_cross_branch
        - diff_invalid_request
        - rollback_version_not_on_branch
        - rollback_blocked_authorization
        - rollback_invalid_request
        - rollback_source_columns_missing
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code: { $ref: '#/components/schemas/ErrorCode' }
        message: { type: string }
    RollbackRequest:
      type: object
      required: [branchId, toVersionId]
      properties:
        branchId: { type: string, format: uuid }
        toVersionId: { type: string, format: uuid }
    RollbackResponse:
      type: object
      required: [newVersionId, clonedDataschemaCount]
      properties:
        newVersionId: { type: string, format: uuid }
        clonedDataschemaCount:
          type: integer
          minimum: 0
