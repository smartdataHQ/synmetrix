tests:
  delete_dataschema_flow:
    steps:
      - name: reject_missing_auth
        http:
          url: http://cubejs:4000/api/v1/dataschema/00000000-0000-4000-8000-000000000099
          method: DELETE
          check:
            status: 403

      - name: reject_not_found
        http:
          url: http://cubejs:4000/api/v1/dataschema/ffffffff-ffff-4fff-8fff-ffffffffffff
          method: DELETE
          headers:
            Authorization: Bearer ${{captures.accessToken}}
          check:
            status: 404
            jsonpath:
              $.code: "validate_target_not_found"

      - name: reject_historical_version
        http:
          url: http://cubejs:4000/api/v1/dataschema/${{captures.historicalDataschemaId}}
          method: DELETE
          headers:
            Authorization: Bearer ${{captures.accessToken}}
          check:
            status: 409
            jsonpath:
              $.code: "delete_blocked_historical_version"

      - name: reject_blocked_by_references
        http:
          url: http://cubejs:4000/api/v1/dataschema/${{captures.referencedDataschemaId}}
          method: DELETE
          headers:
            Authorization: Bearer ${{captures.accessToken}}
          check:
            status: 409
            jsonpath:
              $.code: "delete_blocked_by_references"
              $.blockingReferences:
                - isArray: true

      - name: reject_unauthorized_role
        http:
          url: http://cubejs:4000/api/v1/dataschema/${{captures.dataschemaId}}
          method: DELETE
          headers:
            Authorization: Bearer ${{captures.memberOnlyToken}}
          check:
            status: 403
            jsonpath:
              $.code: "delete_blocked_authorization"

      - name: happy_path_delete
        http:
          url: http://cubejs:4000/api/v1/dataschema/${{captures.dataschemaId}}
          method: DELETE
          headers:
            Authorization: Bearer ${{captures.accessToken}}
          check:
            status: 200
            jsonpath:
              $.deleted: true
              $.dataschemaId: ${{captures.dataschemaId}}
