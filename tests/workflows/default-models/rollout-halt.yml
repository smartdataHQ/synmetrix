version: "1.1"
name: Default Models — broken rollout halts, retirement marks unmanaged (US2)
# Prerequisites: same as reconcile-team.yml. NOTE the halt step runs a FLEET
# reconcile — failed outcomes are recorded for every team, but validation
# failures never write versions, so other teams' models are untouched.
env:
  templateTeamId: "dddddddd-dddd-4ddd-8ddd-dddddddddddd"
  templateBranchId: "eeeeeeee-eeee-4eee-8eee-eeeeeeeeeeee"

tests:
  rollout_halt_and_retirement:
    steps:
      # --- idempotent seeds (shared fixed ids with reconcile-team.yml)
      - name: seed_system_user
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!) {
                insert_users_one(
                  object: { id: $id, display_name: "Synmetrix System" }
                  on_conflict: { constraint: users_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_team
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $userId: uuid!) {
                insert_teams_one(
                  object: { id: $id, name: "StepCI Template Owners", user_id: $userId }
                  on_conflict: { constraint: teams_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.templateTeamId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_datasource
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $teamId: uuid!, $userId: uuid!) {
                insert_datasources_one(
                  object: {
                    id: $id
                    team_id: $teamId
                    user_id: $userId
                    name: "Global Templates"
                    db_type: "CLICKHOUSE"
                    db_params: { host: "100.87.250.36", port: "8123", user: "admin", database: "cst", ssl: false }
                  }
                  on_conflict: { constraint: datasources_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              teamId: ${{env.templateTeamId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_branch
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $datasourceId: uuid!, $userId: uuid!) {
                insert_branches_one(
                  object: { id: $id, datasource_id: $datasourceId, user_id: $userId, name: "main", status: active }
                  on_conflict: { constraint: branches_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.templateBranchId}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: publish_good_template
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($branchId: uuid!, $userId: uuid!, $datasourceId: uuid!, $code: String!) {
                insert_versions_one(object: {
                  branch_id: $branchId
                  user_id: $userId
                  checksum: "stepci-rollout-good-v1"
                  dataschemas: { data: [{
                    name: "semantic_events.yml"
                    code: $code
                    user_id: $userId
                    datasource_id: $datasourceId
                  }] }
                }) { id }
              }
            variables:
              branchId: ${{env.templateBranchId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              code: |
                cubes:
                  - name: SemanticEvents
                    sql_table: cst.semantic_events
                    meta:
                      default_model: true
                      template: semantic_events
                    dimensions:
                      - name: partition
                        sql: partition
                        type: string
                        meta:
                          from_template: true
                    measures:
                      - name: count
                        type: count
                        meta:
                          from_template: true
          check:
            status: 200

      # --- own team with a derived model
      - name: register_owner
        http:
          url: ${{env.HASURA_PLUS_ENDPOINT}}/auth/register
          method: POST
          headers:
            Content-Type: application/json
          json:
            email: dm-rollout-${{env.RUN_SEED}}@example.com
            password: StepCI-dm-1234
            cookie: false
          captures:
            accessToken:
              jsonpath: $.jwt_token
          check:
            status: 200

      - name: whoami
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.accessToken}}
          graphql:
            query: |
              query { users { id } }
          captures:
            userId:
              jsonpath: $.data.users[0].id
          check:
            status: 200

      - name: create_team
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.accessToken}}
            x-hasura-user-id: ${{captures.userId}}
          graphql:
            query: |
              mutation { create_team(name: "dm-rollout-team-${{env.RUN_SEED}}") { id name } }
          captures:
            teamId:
              jsonpath: $.data.create_team.id
          check:
            status: 200

      - name: set_team_partition
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($teamId: uuid!) {
                update_teams_by_pk(
                  pk_columns: { id: $teamId }
                  _append: { settings: { partition: "stepci.rollout" } }
                ) { id }
              }
            variables:
              teamId: ${{captures.teamId}}
          check:
            status: 200

      - name: reconcile_team_baseline
        http:
          url: ${{env.ACTIONS_URL}}/rpc/reconcileTeamDefaultModels
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              teamId: ${{captures.teamId}}
              trigger: manual
          check:
            status: 200
            jsonpath:
              $.outcomes[0].template:
                - eq: semantic_events

      # --- broken template publish → fleet rollout halts (FR-010, SC-003)
      - name: publish_broken_template
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($branchId: uuid!, $userId: uuid!, $datasourceId: uuid!, $code: String!) {
                insert_versions_one(object: {
                  branch_id: $branchId
                  user_id: $userId
                  checksum: "stepci-rollout-broken-v2"
                  dataschemas: { data: [{
                    name: "semantic_events.yml"
                    code: $code
                    user_id: $userId
                    datasource_id: $datasourceId
                  }] }
                }) { id }
              }
            variables:
              branchId: ${{env.templateBranchId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              code: |
                cubes:
                  - name: SemanticEvents
                    sql_table: cst.semantic_events
                    meta:
                      default_model: true
                      template: semantic_events
                    measures:
                      - name: broken_measure
                        type: definitely_not_a_measure_type
                        meta:
                          from_template: true
          check:
            status: 200

      - name: fleet_rollout_halts
        http:
          url: ${{env.ACTIONS_URL}}/rpc/reconcileDefaultModels
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              trigger: manual
          captures:
            haltedRunId:
              jsonpath: $.runId
          check:
            status: 200
            jsonpath:
              $.status:
                - eq: halted

      - name: report_shows_teams_behind
        http:
          url: ${{env.ACTIONS_URL}}/rpc/getDefaultModelsReport
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              runId: ${{captures.haltedRunId}}
          check:
            status: 200
            jsonpath:
              $.run.status:
                - eq: halted
              $.teamsBehind[0].teamId:
                - isString: true
              $.teamsBehind[0].reason:
                - isString: true

      # --- retirement (FR-020): next publish drops semantic_events entirely
      - name: publish_retirement_template_set
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($branchId: uuid!, $userId: uuid!, $datasourceId: uuid!, $code: String!) {
                insert_versions_one(object: {
                  branch_id: $branchId
                  user_id: $userId
                  checksum: "stepci-rollout-retire-v3"
                  dataschemas: { data: [{
                    name: "other_events.yml"
                    code: $code
                    user_id: $userId
                    datasource_id: $datasourceId
                  }] }
                }) { id }
              }
            variables:
              branchId: ${{env.templateBranchId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              code: |
                cubes:
                  - name: OtherEvents
                    sql_table: cst.semantic_events
                    meta:
                      default_model: true
                      template: other_events
                    measures:
                      - name: count
                        type: count
                        meta:
                          from_template: true
          check:
            status: 200

      - name: reconcile_team_retires_semantic_events
        http:
          url: ${{env.ACTIONS_URL}}/rpc/reconcileTeamDefaultModels
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              teamId: ${{captures.teamId}}
              trigger: manual
          check:
            status: 200
            jsonpath:
              $.outcomes[0].reason:
                - eq: retired

      - name: verify_unmanaged_stamp
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              query ($teamId: uuid!) {
                dataschemas(
                  where: {
                    name: { _eq: "semantic_events.yml" }
                    datasource: { team_id: { _eq: $teamId } }
                  }
                  order_by: { created_at: desc }
                  limit: 1
                ) {
                  id
                  code
                }
              }
            variables:
              teamId: ${{captures.teamId}}
          check:
            status: 200
            jsonpath:
              $.data.dataschemas[0].code:
                - match: default_model_unmanaged
