version: "1.1"
name: Default Models — canonical queries adapt per team (US5)
# Same canonical query under two teams' JWTs → per-team scope injection
# (asserted via dry-run normalizedQueries); absent member → deterministic
# DEFAULT_MODEL_MEMBER_UNAVAILABLE before generic validation; non-default
# cube → generic gateway error (pre-processor exclusivity).
env:
  templateTeamId: "dddddddd-dddd-4ddd-8ddd-dddddddddddd"
  templateBranchId: "eeeeeeee-eeee-4eee-8eee-eeeeeeeeeeee"

tests:
  preprocessor_per_team:
    steps:
      - name: seed_system_user
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!) {
                insert_users_one(
                  object: { id: $id, display_name: "Synmetrix System" }
                  on_conflict: { constraint: users_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_team
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $userId: uuid!) {
                insert_teams_one(
                  object: { id: $id, name: "StepCI Template Owners", user_id: $userId }
                  on_conflict: { constraint: teams_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.templateTeamId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_datasource
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $teamId: uuid!, $userId: uuid!) {
                insert_datasources_one(
                  object: {
                    id: $id
                    team_id: $teamId
                    user_id: $userId
                    name: "Global Templates"
                    db_type: "CLICKHOUSE"
                    db_params: { host: "100.87.250.36", port: "8123", user: "admin", database: "cst", ssl: false }
                  }
                  on_conflict: { constraint: datasources_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              teamId: ${{env.templateTeamId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: seed_template_branch
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($id: uuid!, $datasourceId: uuid!, $userId: uuid!) {
                insert_branches_one(
                  object: { id: $id, datasource_id: $datasourceId, user_id: $userId, name: "main", status: active }
                  on_conflict: { constraint: branches_pkey, update_columns: [] }
                ) { id }
              }
            variables:
              id: ${{env.templateBranchId}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
          check:
            status: 200

      - name: publish_template
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($branchId: uuid!, $userId: uuid!, $datasourceId: uuid!, $code: String!) {
                insert_versions_one(object: {
                  branch_id: $branchId
                  user_id: $userId
                  checksum: "stepci-preproc-v1"
                  dataschemas: { data: [{
                    name: "semantic_events.yml"
                    code: $code
                    user_id: $userId
                    datasource_id: $datasourceId
                  }] }
                }) { id }
              }
            variables:
              branchId: ${{env.templateBranchId}}
              userId: ${{env.DEFAULT_MODELS_SYSTEM_USER_ID}}
              datasourceId: ${{env.DEFAULT_MODELS_TEMPLATE_DATASOURCE_ID}}
              code: |
                cubes:
                  - name: SemanticEvents
                    sql_table: cst.semantic_events
                    meta:
                      default_model: true
                      template: semantic_events
                    dimensions:
                      - name: partition
                        sql: partition
                        type: string
                        meta:
                          from_template: true
                    measures:
                      - name: count
                        type: count
                        meta:
                          from_template: true
          check:
            status: 200

      # --- team A
      - name: register_owner_a
        http:
          url: ${{env.HASURA_PLUS_ENDPOINT}}/auth/register
          method: POST
          headers:
            Content-Type: application/json
          json:
            email: dm-pre-a-${{env.RUN_SEED}}@example.com
            password: StepCI-dm-1234
            cookie: false
          captures:
            tokenA:
              jsonpath: $.jwt_token
          check:
            status: 200

      - name: whoami_a
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenA}}
          graphql:
            query: |
              query { users { id } }
          captures:
            userA:
              jsonpath: $.data.users[0].id
          check:
            status: 200

      - name: create_team_a
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenA}}
            x-hasura-user-id: ${{captures.userA}}
          graphql:
            query: |
              mutation { create_team(name: "dm-pre-team-a-${{env.RUN_SEED}}") { id } }
          captures:
            teamA:
              jsonpath: $.data.create_team.id
          check:
            status: 200

      - name: set_partition_a
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($teamId: uuid!) {
                update_teams_by_pk(
                  pk_columns: { id: $teamId }
                  _append: { settings: { partition: "stepci.pre-a-${{env.RUN_SEED}}" } }
                ) { id }
              }
            variables:
              teamId: ${{captures.teamA}}
          check:
            status: 200

      - name: reconcile_team_a
        http:
          url: ${{env.ACTIONS_URL}}/rpc/reconcileTeamDefaultModels
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              teamId: ${{captures.teamA}}
              trigger: manual
          check:
            status: 200

      - name: target_ds_a
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              query ($teamId: uuid!, $name: String!) {
                datasources(where: { team_id: { _eq: $teamId }, name: { _eq: $name } }, limit: 1) { id }
              }
            variables:
              teamId: ${{captures.teamA}}
              name: ${{env.DEFAULT_MODELS_TARGET_DATASOURCE_NAME}}
          captures:
            dsA:
              jsonpath: $.data.datasources[0].id
          check:
            status: 200

      # --- team B
      - name: register_owner_b
        http:
          url: ${{env.HASURA_PLUS_ENDPOINT}}/auth/register
          method: POST
          headers:
            Content-Type: application/json
          json:
            email: dm-pre-b-${{env.RUN_SEED}}@example.com
            password: StepCI-dm-1234
            cookie: false
          captures:
            tokenB:
              jsonpath: $.jwt_token
          check:
            status: 200

      - name: whoami_b
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenB}}
          graphql:
            query: |
              query { users { id } }
          captures:
            userB:
              jsonpath: $.data.users[0].id
          check:
            status: 200

      - name: create_team_b
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenB}}
            x-hasura-user-id: ${{captures.userB}}
          graphql:
            query: |
              mutation { create_team(name: "dm-pre-team-b-${{env.RUN_SEED}}") { id } }
          captures:
            teamB:
              jsonpath: $.data.create_team.id
          check:
            status: 200

      - name: set_partition_b
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              mutation ($teamId: uuid!) {
                update_teams_by_pk(
                  pk_columns: { id: $teamId }
                  _append: { settings: { partition: "stepci.pre-b-${{env.RUN_SEED}}" } }
                ) { id }
              }
            variables:
              teamId: ${{captures.teamB}}
          check:
            status: 200

      - name: reconcile_team_b
        http:
          url: ${{env.ACTIONS_URL}}/rpc/reconcileTeamDefaultModels
          method: POST
          headers:
            Content-Type: application/json
            x-actions-cron-secret: ${{env.ACTIONS_CRON_SECRET}}
          json:
            input:
              teamId: ${{captures.teamB}}
              trigger: manual
          check:
            status: 200

      - name: target_ds_b
        http:
          url: ${{env.HASURA_ENDPOINT}}
          method: POST
          headers:
            Content-Type: application/json
            x-hasura-admin-secret: ${{env.HASURA_GRAPHQL_ADMIN_SECRET}}
          graphql:
            query: |
              query ($teamId: uuid!, $name: String!) {
                datasources(where: { team_id: { _eq: $teamId }, name: { _eq: $name } }, limit: 1) { id }
              }
            variables:
              teamId: ${{captures.teamB}}
              name: ${{env.DEFAULT_MODELS_TARGET_DATASOURCE_NAME}}
          captures:
            dsB:
              jsonpath: $.data.datasources[0].id
          check:
            status: 200

      # --- SAME canonical query, per-team scope injection (SC-005)
      - name: canonical_query_team_a
        http:
          url: ${{env.CUBEJS_URL}}/api/v1/dry-run
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenA}}
            x-hasura-datasource-id: ${{captures.dsA}}
          json:
            query:
              measures: ["SemanticEvents.count"]
          check:
            status: 200
            jsonpath:
              $.normalizedQueries[0].filters[0].member:
                - eq: SemanticEvents.partition
              $.normalizedQueries[0].filters[0].values[0]:
                - eq: stepci.pre-a-${{env.RUN_SEED}}

      - name: canonical_query_team_b
        http:
          url: ${{env.CUBEJS_URL}}/api/v1/dry-run
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenB}}
            x-hasura-datasource-id: ${{captures.dsB}}
          json:
            query:
              measures: ["SemanticEvents.count"]
          check:
            status: 200
            jsonpath:
              $.normalizedQueries[0].filters[0].values[0]:
                - eq: stepci.pre-b-${{env.RUN_SEED}}

      # absent member → deterministic, specific rejection (NOT a generic
      # validation error) — fires before gateway validation
      - name: absent_member_rejected
        http:
          url: ${{env.CUBEJS_URL}}/api/v1/dry-run
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenA}}
            x-hasura-datasource-id: ${{captures.dsA}}
          json:
            query:
              measures: ["SemanticEvents.count"]
              dimensions: ["SemanticEvents.member_only_other_teams_have"]
          check:
            status: 400
            jsonpath:
              $.code:
                - eq: DEFAULT_MODEL_MEMBER_UNAVAILABLE
              $.member:
                - eq: SemanticEvents.member_only_other_teams_have
              $.template:
                - eq: semantic_events

      # non-default cube → pre-processor exclusivity: the gateway's own
      # generic error comes back (no DEFAULT_MODEL_* code shape)
      - name: team_only_query_untouched
        http:
          url: ${{env.CUBEJS_URL}}/api/v1/dry-run
          method: POST
          headers:
            Content-Type: application/json
            Authorization: Bearer ${{captures.tokenA}}
            x-hasura-datasource-id: ${{captures.dsA}}
          json:
            query:
              measures: ["SomeTeamOnlyCube.count"]
          check:
            status: 400
            jsonpath:
              $.error:
                - isString: true
